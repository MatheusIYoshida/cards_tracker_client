<form class="cards-form">
  <div class="cards-form__row">
    <app-form-input
      [enableLabel]="true"
      [labelText]="'Card number'"
      [type]="'text'"
      [maxLength]="50"
    ></app-form-input>
    <app-form-input
      [enableLabel]="true"
      [labelText]="'Title'"
      [type]="'text'"
      [maxLength]="120"
    ></app-form-input>
  </div>

  <div class="cards-form__row">
    <app-form-input
      [enableLabel]="true"
      [labelText]="'Module'"
      [type]="'text'"
      [maxLength]="80"
    ></app-form-input>
    <app-form-input
      [enableLabel]="true"
      [labelText]="'Type'"
      [type]="'text'"
      [maxLength]="40"
    ></app-form-input>
  </div>

  <div class="cards-form__row">
    <app-form-input
      [enableLabel]="true"
      [labelText]="'Target date'"
      [type]="'date'"
      [maxLength]="10"
    ></app-form-input>
    <app-form-input
      [enableLabel]="true"
      [labelText]="'Date started'"
      [type]="'date'"
      [maxLength]="10"
    ></app-form-input>
  </div>

  <app-form-input
    [enableLabel]="true"
    [labelText]="'Description'"
    [type]="'text'"
    [maxLength]="255"
  ></app-form-input>

  <div class="cards-form__actions">
    <app-form-button [btnText]="'Save card'"></app-form-button>
  </div>
</form>
