<div class="login-form">
  <app-form-input
    [enableLabel]="true"
    [labelText]="'login.email'"
    [type]="'email'"
    [placeholderText]="'login.email-placeholder'"
    [maxLength]="100"
  ></app-form-input>
  <app-form-input
    [enableLabel]="true"
    [labelText]="'login.password'"
    [type]="'password'"
    [placeholderText]="'********'"
    [maxLength]="100"
  ></app-form-input>
  <app-form-button 
    [btnText]="'login.sign-in'"
    [routerLink]="'/dashboard'"
  ></app-form-button>
  <div class="divider">{{ 'login.divider' | translate }}</div>
  <div class="signup-link">
    {{ 'login.sign-up' | translate }} <a routerLink="/auth/register">{{ 'login.sign-up-link' | translate }}</a>
  </div>
</div>
