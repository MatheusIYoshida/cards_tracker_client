<div class="register-form">
    <app-form-input
        [enableLabel]="true"
        [labelText]="'input.name'"
        [type]="'text'"
        [placeholderText]="'input.name-placeholder'"
        [maxLength]="100"
    ></app-form-input>
    <app-form-input
        [enableLabel]="true"
        [labelText]="'input.email'"
        [type]="'email'"
        [placeholderText]="'input.email-placeholder'"
        [maxLength]="100"
    ></app-form-input>
    <app-form-input
        [enableLabel]="true"
        [labelText]="'input.password'"
        [type]="'password'"
        [placeholderText]="'********'"
        [maxLength]="100"
    ></app-form-input>
    <app-form-button 
        [btnText]="'register.create-account'"
        [routerLink]="'/auth/login'"
    ></app-form-button>
    <div class="signin-link">
        {{ 'register.sign-in' | translate }} <a routerLink="/auth/login">{{ 'register.sign-in-link' | translate }}</a>
    </div>
</div>
